name: Security Review

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - name: Remove attacker supplied findings
        run: rm -f findings.json
      - name: Remove old PR comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Fetching comments for PR #$PR_NUMBER..."
          COMMENTS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/comments" | jq -r '.[].id')
          
          if [ -z "$COMMENTS" ]; then
            echo "No comments to delete."
          else
            for COMMENT_ID in $COMMENTS; do
              echo "Deleting comment ID: $COMMENT_ID"
              curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
                   -H "Accept: application/vnd.github+json" \
                   "https://api.github.com/repos/$REPO/pulls/comments/$COMMENT_ID"
            done
            echo "All old comments deleted."
          fi
      - uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-model: claude-sonnet-4-6
          run-every-commit: true
      - name: Block merge if vulnerabilities found
        run: |
          if [ ! -f findings.json ]; then
            echo "Security scan did not produce findings.json"
            exit 1
          fi
          COUNT=$(jq length findings.json)
          echo "Findings: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "Security vulnerabilities detected"
            exit 1
          fi
